# TEMPORARY mining runner (not for main). mine.yml is workflow_dispatch-only and
# the agent's API token can't dispatch it, so this pushes a one-off run on a
# `claude/mine-*` branch: clone pool-heavy public C# repos and run own-check over
# them, echoing each report into the job log for a false-positive audit. Read-only;
# delete the branch when the audit is done. Edit TARGETS and re-push to scan others.
name: mine-run (temp)

on:
  push:
    branches: ["claude/mine-*"]

permissions:
  contents: read

jobs:
  mine:
    name: mine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Mine the targets
        run: |
          # "owner/repo::subdir"  (subdir optional; empty -> whole repo)
          targets=(
            "microsoft/Microsoft.IO.RecyclableMemoryStream::src"
            "mgravell/Pipelines.Sockets.Unofficial::src"
          )
          for t in "${targets[@]}"; do
            repo="${t%%::*}"; path="${t##*::}"; [[ "$path" == "$repo" ]] && path=""
            echo "::group::mine $repo ${path:+($path)}"
            args=(); [[ -n "$path" ]] && args+=(--paths "$path")
            scripts/mine.sh "${args[@]}" "$repo" || echo "mine: FAILED for $repo (see above)"
            echo "::endgroup::"
          done
      - name: Echo all reports + findings into the job log
        if: always()
        run: |
          for r in corpus/mined/*/report.md; do
            [[ -f "$r" ]] || continue
            echo "::group::report.md — $r"; cat "$r"; echo "::endgroup::"
          done
          for f in corpus/mined/*/findings.txt; do
            [[ -f "$f" ]] || continue
            echo "::group::findings.txt — $f"; cat "$f"; echo "::endgroup::"
          done
